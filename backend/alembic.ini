# Alembic Configuration — 12 Months
# Run alembic from the backend/ directory: cd backend && alembic upgrade head

[alembic]
script_location = migrations

# Template for migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Path prepended to sys.path for env.py imports
prepend_sys_path = .

version_path_separator = os

# sqlalchemy.url is overridden in env.py from pydantic settings
# This placeholder is required by alembic but will NOT be used
sqlalchemy.url = postgresql+asyncpg://user:pass@localhost/dbname

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
