# ──────────────────────────────────────────────────────────────────────────────
# 12 Months — Production Docker Compose
#
# Services:
#   postgres  — PostgreSQL 16 (persistent volume)
#   redis     — Redis 7 (persistent volume + AOF)
#   backend   — FastAPI + bot via Gunicorn/Uvicorn workers
#   nginx     — Reverse proxy + static file server for frontend dist
#
# Before first run:
#   cp .env.example .env  && fill in all secrets
#   docker compose -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend (FastAPI + bot via Gunicorn) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST:    redis
    command: >
      gunicorn backend.main:app
        --worker-class uvicorn.workers.UvicornWorker
        --workers 2
        --bind 0.0.0.0:8000
        --timeout 120
        --graceful-timeout 30
        --access-logfile -
        --error-logfile -
        --log-level info
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - internal

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/var/www/html:ro
      # Mount Let's Encrypt certs (managed externally via certbot)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  nginx_logs:

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
