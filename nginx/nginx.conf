# ──────────────────────────────────────────────────────────────────────────────
# Nginx configuration for 12 Months
#
# Responsibilities:
#   1. Serve React SPA static files from /var/www/html (Vite dist folder)
#   2. Proxy /api/* and /webhook to the FastAPI backend container
#   3. HTTPS termination (Let's Encrypt certs mounted at /etc/letsencrypt)
#   4. Gzip compression, security headers, cache control
# ──────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ── Performance ────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ── Gzip ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upstream: FastAPI backend ──────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 16;
    }

    # ── Rate limiting ──────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:1m rate=100r/s;

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;   # replace with your domain in production

        # ── SSL certs (Let's Encrypt via certbot) ──────────────
        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ───────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            DENY always;
        add_header X-Content-Type-Options     nosniff always;
        add_header X-XSS-Protection           "1; mode=block" always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;

        # ── Static files: React SPA ────────────────────────────
        location / {
            root /var/www/html;
            index index.html;

            # SPA fallback: all unknown paths → index.html
            try_files $uri $uri/ /index.html;

            # Aggressive cache for hashed JS/CSS assets
            location ~* \.(js|css|woff2?|ttf|eot|otf|ico|svg|png|jpg|jpeg|webp|gif)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }

            # No-cache for HTML
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }

        # ── API proxy → FastAPI ────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=60 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout    120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;

            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ── Telegram webhook proxy → FastAPI ───────────────────
        location /webhook {
            limit_req zone=webhook_limit burst=200 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout 30s;
        }

        # ── Health check (no auth needed) ──────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Block dotfiles ─────────────────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
