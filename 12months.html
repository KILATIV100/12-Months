<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400&family=Jost:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: 'Jost', sans-serif;
    background: #ece7db;
    color:#1a1a1a;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  #root { width:100vw; height:100vh; }

  /* Scrollbar inside phone */
  .phone-scroll::-webkit-scrollbar { width:0; display:none; }
  .phone-scroll { scrollbar-width:none; -ms-overflow-style:none; }

  /* Disable native pull-to-refresh inside frames */
  .no-bounce { overscroll-behavior:contain; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.04);opacity:0.85} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  @keyframes slideRight { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
</head>

<div id="root"></div>
