server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API/webhook traffic must never silently fall through to the SPA — if it
    # does, the response is index.html and HTTP 200, which masks misconfigured
    # VITE_API_URL or WEBHOOK_HOST. Surface those instead with an explicit 404.
    location /api/ { return 404; }
    location = /health { return 404; }
    location = /docs { return 404; }

    # SPA fallback so /greeting/<token> resolves to React Router
    location / {
        try_files $uri /index.html;
    }
}
